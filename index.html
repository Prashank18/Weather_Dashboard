<!DOCTYPE html>
<html>
<head>
    <title>India Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Weather Dashboard</h1>

    <input type="text" id="cityInput" placeholder="Enter city or village">
    <button id="searchBtn">Search</button>

    <div id="weatherResult">
        <h2 id="cityName"></h2>
        <p id="temp"></p>
        <p id="humidity"></p>
        <p id="condition"></p>
    </div>

    <h2>Next 5 Days Forecast</h2>
    <div id="forecast"></div>

</div>

<script src="script.js"></script>
</body>
</html>
